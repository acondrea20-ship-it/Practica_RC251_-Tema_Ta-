<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laborator - test_formular.html</title>
    <style>
        :root {
            --bg-formular: #ffffff; 
            --accent-color: #2563eb;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #e5e7eb;
            margin: 0;
            padding: 20px;
        }

        .grid-wrapper {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        #test-form-container {
            background-color: var(--bg-formular);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: background-color 0.2s ease;
        }

        fieldset {
            border: 1px solid #d1d5db;
            border-radius: 6px;
            margin-bottom: 20px;
            padding: 15px;
        }

        legend {
            font-weight: bold;
            color: var(--accent-color);
            padding: 0 10px;
        }

        .form-row { margin-bottom: 15px; }
        
        label { 
            display: block; 
            margin-bottom: 5px; 
            font-size: 14px; 
            font-weight: 600; 
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        select {
            border-left: 4px solid var(--accent-color);
            background-color: #fafafa;
        }

        .char-count-box {
            text-align: right;
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .sidebar {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            height: fit-content;
        }

        iframe {
            width: 100%;
            height: 250px;
            border: 0;
            border-radius: 8px;
        }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="grid-wrapper">
    <!-- COLOANA STÂNGĂ: FORMULARUL -->
    <main id="test-form-container">
        <form id="mainForm">
            <h1>Formular Înregistrare</h1>

            <fieldset>
                <legend>Date Acces & Contact</legend>
                
                <div class="form-row">
                    <label for="user">Username:</label>
                    <input type="text" id="user" name="username" required 
                           autocomplete="username"
                           pattern="[a-z0-9]{5,}" 
                           title="Minim 5 caractere, litere mici și cifre">
                </div>

                <div class="form-row">
                    <label for="pass">Parolă:</label>
                    <input type="password" id="pass" name="password" required 
                           autocomplete="new-password"
                           pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[\W_]).{8,}" 
                           title="Minim 8 char, 1 majusculă, 1 cifră, 1 simbol">
                </div>

                <div class="form-row">
                    <label for="tel">Telefon:</label>
                    <input type="tel" id="tel" name="phone" 
                           autocomplete="tel" value="+37368128717">
                </div>
            </fieldset>

            <fieldset>
                <legend>Detalii Rezervare</legend>

                <div class="form-row">
                    <label for="data">Data Rezervării (Mai 2026):</label>
                    <input type="date" id="data" name="data" required 
                           min="2026-05-01" max="2026-05-31">
                </div>

                <div class="form-row">
                    <label for="serviciu">Subiect Mesaj:</label>
                    <select id="serviciu" name="serviciu">
                        <option value="suport">Suport Tehnic</option>
                        <option value="info">Informații Generale</option>
                        <option value="curs">Înscriere Curs</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="comentarii">Mesaj:</label>
                    <textarea id="comentarii" maxlength="100" rows="4"></textarea>
                    <div class="char-count-box"><span id="counter">0</span>/100 caractere</div>
                </div>

                <div class="form-row">
                    <label for="color">Culoare Temă Fundal:</label>
                    <input type="color" id="color" value="#ffffff">
                </div>
            </fieldset>

            <button type="submit">Trimite Datele</button>
        </form>
    </main>

    <!-- COLOANA DREAPTĂ: DATELE TALE DE CONTACT -->
    <aside class="sidebar">
        <h3>Contact Info</h3>
        <p><strong>📧 Email:</strong><br>acondrea20@gmail.com</p>
        <p><strong>📞 Telefon:</strong><br>+373 681 28 717</p>
        <p><strong>📍 Locație:</strong><br>Chisinau, Moldova</p>
        <hr>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2719.261803561491!2d28.8322744!3d47.0104529!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x40c97c3628b769ad%3A0x23e347732a32126b!2zQ2hpyJlpbsSDdSwgTW9sZG92YQ!5e0!3m2!1sro!2sro!4v1652000000000!5m2!1sro!2sro"></iframe>
    </aside>
</div>

<script>
    // Logică schimbară culoare fundal via variabilă CSS
    const colorInput = document.getElementById('color');
    colorInput.addEventListener('input', (e) => {
        document.documentElement.style.setProperty('--bg-formular', e.target.value);
    });

    // Logică contor caractere vizibil
    const textarea = document.getElementById('comentarii');
    const counterDisplay = document.getElementById('counter');

    textarea.addEventListener('input', () => {
        counterDisplay.textContent = textarea.value.length;
    });
</script>

</body>
</html>
