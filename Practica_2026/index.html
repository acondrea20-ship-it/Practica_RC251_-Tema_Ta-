<!DOCTYPE html>
<html lang="ro">
<head>
  <!-- Live Deployment & Security Headers Configured by: Condrea Adriana | RC-251 | Data: 18.05.2026 -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magia Evenimentelor</title>
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://domeniul-tau.ro/index.html">
<meta property="og:type" content="website">
<meta property="og:title" content="Magia Evenimentelor">
<meta property="og:description" content="Servicii profesionale pentru evenimente.">
<meta property="og:image" content="assets/img/preview.webp">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --accent:#2563eb;
  --bg:#ffffff;
  --text:#1c1917;
  --muted:#78716c;

  --base-delay:120ms;
  --step:160ms;
  --ease:cubic-bezier(0.5,1.5,0.5,1);
}

body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.header{
  text-align:center;
  padding:60px 20px;
}

.header h1{
  font-family:'Playfair Display',serif;
  font-size:3rem;
}

.services{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
  padding:40px;
}

.service{
  width:300px;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}

.service img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.ui-orchestrator{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
  padding:40px;
}

.feature-wrapper{
  --delay: calc(var(--i) * var(--step));
  animation:enter 800ms var(--ease) forwards;
  opacity:0;
  animation-delay:var(--delay);
}

@keyframes enter{
  from{
    opacity:0;
    transform:translateY(40px);
    filter:blur(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
    filter:blur(0);
  }
}

.feature-card{
  width:200px;
  padding:20px;
  background:#fff;
  border:2px solid #2563eb;
  border-radius:12px;
  text-align:center;
  transition:0.3s;
}

.feature-card:hover{
  transform:scale(1.05);
}

form{
  max-width:500px;
  margin:auto;
  padding:40px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
}

button{
  padding:10px 20px;
  background:var(--accent);
  color:white;
  border:none;
}

.contact{
  text-align:center;
  padding:40px;
}

iframe{
  width:80%;
  height:300px;
  border:0;
}

</style>
</head>

<body>

<header class="header" role="banner">
  <h1>Magia Evenimentelor</h1>
</header>

<main role="main">
<!-- Asset Optimization: WebP + Lazy Loading implemented by Adriana Condrea -->
<section class="services" aria-label="Servicii oferite">

  <div class="service">
  <picture>
    <source srcset="assets/img/nunta.webp" type="image/webp">
    <img src="assets/img/nunta.jpg" alt="Nuntă elegantă"
         loading="lazy" width="600" height="400">
  </picture>
  <h3>Nuntă</h3>
</div>

  <div class="service">
    <img src="assets/img/botez.webp" alt="Botez festiv"
         loading="lazy" width="600" height="400" decoding="async">
    <h3>Botez</h3>
  </div>

  <div class="service">
    <img src="assets/img/party.webp" alt="Petrecere modernă"
         loading="lazy" width="600" height="400" decoding="async">
    <h3>Party</h3>
  </div>

</section>

<section class="ui-orchestrator" aria-label="Caracteristici platformă">

  <div class="feature-wrapper" style="--i:1"><div class="feature-card">Viteză</div></div>
  <div class="feature-wrapper" style="--i:2"><div class="feature-card">Design</div></div>
  <div class="feature-wrapper" style="--i:3"><div class="feature-card">Logică</div></div>
  <div class="feature-wrapper" style="--i:4"><div class="feature-card">Animații</div></div>
  <div class="feature-wrapper" style="--i:5"><div class="feature-card">Sistem</div></div>
  <div class="feature-wrapper" style="--i:6"><div class="feature-card">UI</div></div>

</section>

<section aria-label="Formular de rezervare">

  <h2 style="text-align:center;">Formular rezervare</h2>

  <form>
    <input placeholder="Username" aria-label="Introdu username-ul">
    <input type="password" placeholder="Parolă" aria-label="Introdu parola">
    <textarea placeholder="Mesaj" aria-label="Scrie mesajul tău"></textarea>
    <button aria-label="Trimite formularul">Trimite</button>
  </form>

</section>

<section class="contact" aria-label="Locație și hartă">

  <h2>Locație și Prezentare</h2>

  <h3>Video</h3>
  <iframe src="https://www.youtube.com/embed/v0r03z50Es4"></iframe>

  <h3>Harta</h3>
  <iframe src="https://www.google.com/maps?q=Chișinău,Moldova&output=embed"></iframe>

</section>

</main>

<footer role="contentinfo">
  <p>© 2026 Adriana Condrea</p>
</footer>

<!-- Accessibility Audit: WAI-ARIA implementation by Adriana Condrea -->
<!-- Final Quality Audit: Mobile Performance Optimized by Adriana Condrea -->
</body>
</html>
